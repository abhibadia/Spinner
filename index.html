<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spinner</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <header class="navbar">
    <a href="#home" class="logo">SPINNER</a>

    <nav class="nav-links">
      <a href="#pick-six">Pick 6</a>
      <a href="#creator">Meet the Creator</a>
      <a href="#download" class="download-link">Download</a>
    </nav>
  </header>

  <img src="hero.png" alt="Description of the picture" style="max-width: 100%; height: auto;">

  <section class="split-showcase">
    <div class="image-card">
        <img src="images/vinyl-preview.png" alt="Spinner vinyl player preview">
    </div>

    <div class="text-box">
        <p class="eyebrow">Your music, spinning again</p>
        <h1>Bring your vinyl collection online.</h1>
        <p>
        Spinner gives your records a digital home with a warm, record-shop feel.
        Browse your collection, pick what to play, and keep the experience simple,
        beautiful, and personal.
        </p>

        <a href="#download" class="showcase-button">Download Spinner</a>
    </div>
  </section>
</body>
</html>
